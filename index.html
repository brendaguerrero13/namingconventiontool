<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nu Global AG · Evidence Naming Tool</title>
    <style>
        body { font-family: sans-serif; background: #f8f7ff; padding: 40px; color: #1a1a2e; }
        .container { max-width: 800px; margin: auto; background: white; padding: 30px; border-radius: 15px; shadow: 0 4px 6px rgba(0,0,0,0.1); border: 1px solid #e5e0f0; }
        h1 { color: #820AD1; font-size: 24px; }
        .step { margin-bottom: 20px; padding: 15px; border: 1px solid #eee; border-radius: 10px; }
        button { background: #820AD1; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        button:hover { background: #6d07b0; }
        select, input { width: 100%; padding: 10px; margin-top: 10px; border-radius: 5px; border: 1px solid #d1c4e9; }
        .result { background: #f5f3ff; padding: 15px; border-radius: 8px; margin-top: 20px; font-family: monospace; border: 1px dashed #820AD1; }
    </style>
</head>
<body>
    <div class="container">
        <div style="display:flex; align-items:center; gap:10px;">
            <span style="color:#820AD1; font-weight:800; font-size:28px;">Nu</span>
            <h1 style="margin:0;">Evidence Naming Tool</h1>
        </div>
        <p style="color:#6b7280;">Standardize your goAML Switzerland filings.</p>
        
        <div class="step">
            <h3>1. Select B-Code (Evidence Category)</h3>
            <select id="bcode">
                <option value="3001B">3001B · Identification documents</option>
                <option value="3007B">3007B · Account statements</option>
                <option value="3008B">3008B · Transaction details</option>
                <option value="3009B">3009B · Evidence of suspicion</option>
                <option value="3010B">3010B · Clarification records (Mandatory)</option>
            </select>
        </div>

        <div class="step">
            <h3>2. File Description</h3>
            <input type="text" id="desc" placeholder="e.g. Passport_Client_X">
        </div>

        <div class="step">
            <h3>3. Report Date</h3>
            <input type="date" id="date">
        </div>

        <button onclick="generateName()">Generate File Name</button>

        <div id="output" class="result" style="display:none;">
            <strong>Result:</strong> <span id="finalName"></span>
        </div>
    </div>

    <script>
        // Lógica simple para que funcione de inmediato
        document.getElementById('date').valueAsDate = new Date();
        
        function generateName() {
            const date = document.getElementById('date').value.replace(/-/g, '');
            const bcode = document.getElementById('bcode').value;
            const desc = document.getElementById('desc').value.trim().replace(/\s+/g, '_');
            
            if(!desc) { alert("Please enter a description"); return; }
            
            const result = `${date}_${bcode}_${desc}.pdf`;
            document.getElementById('finalName').innerText = result;
            document.getElementById('output').style.display = 'block';
        }
    </script>
</body>
</html>
